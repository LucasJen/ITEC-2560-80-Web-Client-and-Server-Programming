<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <label for="name">Name:</label>
    <input id="name" name="name" type="text" maxlength="70">
    <br>
    <label for="password">Password:</label>
    <input id="password" name="password" type="password" maxlength="70">
    <br>
    <label for="email">email:</label>
    <input id="email" name="email" type="text" maxlength="100">
    <br>
    <label for="shirtSize">T-shirt size:</label>
    <select name="shirtSize" id="shirtSize">
        <option>Small</option>
        <option>Medium</option>
        <option>Large</option>
        <option>X-Large</option>
        <option>2X-Large</option>
    </select>
    <br>
    <label for="dateOfBirth">Date of Birth:</label>
    <input id="dateOfBirth" name="dateOfBirth" type="date">
    <br>
    <label for="receiveEmailUpdates">Receive email updates?</label>
    <input id="receiveEmailUpdates" name="receiveEmailUpdates" type="checkbox">
    <br>
    <p>What sessions will you attend?</p>
    <label for="morning">Morning</label>
    <input id="morning" type="checkbox">
    <label for="afternoon">Afternoon</label>
    <input id="afternoon" type="checkbox">
    <br>
    <label for="specialRequests">Special Requests (optional):</label>
    <input id="specialRequests" name="specialRequests" type="text">
    <br>
    <button id="submit-registration-button">Submit your registration</button>
<script>

    let submitRegistrationButton = document.querySelector('#submit-registration-button')
    let nameInput = document.querySelector('#name')
    let passwordInput = document.querySelector('#password')
    let emailInput = document.querySelector('#email')
    let shirtSizeSelect = document.querySelector('#shirtSize')
    let dateOfBirthInput = document.querySelector('#dateOfBirth')
    let receiveEmailUpdatesCheckbox = document.querySelector('#receiveEmailUpdates')
    let morningSessionCheckbox = document.querySelector('#morning')
    let afternoonSessionCheckbox = document.querySelector('#afternoon')
    let specialRequestsInput = document.querySelector('#specialRequests')

    submitRegistrationButton.addEventListener('click', function() {
        let errorsArray = []

        let name = nameInput.value
        let password = passwordInput.value
        let email = emailInput.value
        let shirtSize = shirtSizeSelect.value
        let dateOfBirth = dateOfBirthInput.value
        let receiveEmailUpdates = receiveEmailUpdatesCheckbox.checked
        let morningChecked = morningSessionCheckbox.checked
        let afternoonChecked = afternoonSessionCheckbox.checked
        let specialRequests = specialRequestsInput.value

        // Used to validate the above  user input
        if (name.length === 0) {
            errorsArray.push('Name is required.')
        }
        if (password.length === 0) {
            errorsArray.push('Password is required.')
        }
        if (email.length === 0) {
            errorsArray.push('Email is required.')
        }
        if (dateOfBirth.length === 0) {
            errorsArray.push('Date of birth is required.')
        }

        // Used to validate that at least one is checked
        if (!morningChecked && !afternoonChecked) {
            errorsArray.push('Please select at least one session (morning or afternoon).')
        }

        // will return and alert if there are errors
        if (errorsArray.length > 0) {
            alert(errorsArray.join('\n'))
            return
        }

        //if no errrors then the below will run:

        let sessionsAttended = []
        if (morningChecked) {
            sessionsAttended.push('morning')
        }
        if (afternoonChecked) {
            sessionsAttended.push('afternoon')
        }

        // Build the registration object
        let registrationObject = {
            name: name,
            password: password,
            email: email,
            tShirtSize: shirtSize,
            dateOfBirth: dateOfBirth,
            receiveEmailUpdates: receiveEmailUpdates,
            sessionsAttended: sessionsAttended,
            specialRequests: specialRequests
        }

        console.log(registrationObject)
        alert('Registration complete!')
    })
</script>
</body>
</html>
