<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p>Please enter your name</p>
    <input type="text" id="username">
    <button id="save-user-name">Save</button>

    <p id="welcome-message"></p>
    
<script>
    // variables created that can be used to change items with specific classes or ids
    let saveButton = document.querySelector('#save-user-name')
    let nameInput = document.querySelector('#username')
    let welcomeMessage = document.querySelector('#welcome-message')

    // evenListener waits for a specific action to occur
    saveButton.addEventListener('click', function() {
        let name = nameInput.value
        // a variable is assigned to the value that was input
        if (name.length < 2){
            welcomeMessage.innerHTML = 'Please enter at least 2 letters.'
            //conditional that changes the output of the paragraph depending on input.
        } else {
            welcomeMessage.innerHTML = `Welcome, ${name}!`
        }
        
    })




</script>
</body>
</html>
