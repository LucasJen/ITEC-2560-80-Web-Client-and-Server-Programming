<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="name">Name:</label>
        <input id="name" name="name" type="text" maxlength="70" required>
        <br>
        <label for="password">Password:</label>
        <input id="password" name="password" type="password" maxlength="70" required>
        <br>
        <label for="email">email:</label>
        <input id="email" name="email" type="text" maxlength="100" required>
        <br>
        <label for="shirtSize">T-shirt size:</label>
        <select name="shirtSize" id="shirtSize">
            <option>Small</option>
            <option>Medium</option>
            <option>Large</option>
            <option>X-Large</option>
            <option>2X-Large</option>
        </select>


        <p>What sessions will you attend?</p>

        <label for="morning">Morning</label>
        <input id="morning" type="checkbox">
        <label for="afternoon">Afternoon</label>
        <input id="afternoon" type="checkbox">


        <button type="submit">Submit your registration</button>
            </form>
</body>
</html>
