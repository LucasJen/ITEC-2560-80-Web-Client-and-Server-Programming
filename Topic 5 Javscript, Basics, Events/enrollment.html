<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <p>How many credits are you taking this semester?</p>
    <input type="number" id="credit-count">
    <button id="submit-credits">Enter</button>

    <p id="status-message"></p>



<script>

    let submitButton = document.querySelector('#submit-credits')
    let creditsInput = document.querySelector('#credit-count')
    let statusMessage = document.querySelector('#status-message')

    // function is called once the "enter" button is pressed
    submitButton.addEventListener('click', function(){
        // assign variable to the value of the user input
        let credits = creditsInput.value
        //conditionals to ensure credit input falls within the correct ranges.
        if (credits > 24) {
            statusMessage.innterHTML = "Error, enter 24 or less credits."
        } else if (credits >= 12) {
            statusMessage.innerHTML = 'You are enrolled full time'
        }else if (credits >= 6) {
            statusMessage.innerHTML = 'You are enrolled half time'
        } else if (credits < 6 && credits >= 0) {
            statusMessage.innerHTML = 'You are enrolled less than half time'
        } else {
            statusMessage.innerHTML = 'Your input is invalid'
        }


    })

</script>
</body>
</html>
